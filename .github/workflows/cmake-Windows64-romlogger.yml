name: Windows64-RomLogger

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Windows 64bit Build with ROM Logger'

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@master

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-SDL2
          mingw-w64-x86_64-SDL2_ttf
          mingw-w64-x86_64-SDL2_image
          mingw-w64-x86_64-SDL2_mixer
          mingw-w64-x86_64-libogg
          mingw-w64-x86_64-libvorbis
          mingw-w64-x86_64-libzip
          mingw-w64-x86_64-zlib
          autoconf
          automake
          libtool
          make
          perl

    - name: Build libmpeg2 from bundled source
      run: |
        cd src/3rdparty/libmpeg2
        tar xzf libmpeg2-master.tgz
        cd libmpeg2-master
        autoreconf -f -i
        ./configure --prefix=/mingw64 --disable-shared --enable-static --disable-sdl --quiet
        # Build only the library, skip src/ which contains mpeg2dec (conflicts with Windows getopt)
        make -C libmpeg2 V=0
        make -C libmpeg2 install
        # Install headers manually
        mkdir -p /mingw64/include/mpeg2dec
        cp include/mpeg2.h include/mpeg2convert.h /mingw64/include/mpeg2dec/

    - name: Build
      run: |
        mkdir build
        cd build
        cmake ../src -G Ninja -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD_LIBRARIES="-lSDL2_mixer -lSDL2_image -lSDL2_ttf -lmingw32 -lkernel32 -luser32 -lgdi32 -lwinspool -lshell32 -lole32 -loleaut32 -luuid -lcomdlg32 -ladvapi32"
        ninja

    - name: Package
      run: |
        mkdir dist
        cp build/hypseus.exe dist/
        # Copy only the DLLs that hypseus.exe actually needs (from /mingw64 only)
        ldd build/hypseus.exe \
          | grep '/mingw64' \
          | awk '{print $3}' \
          | xargs -I{} cp {} dist/

    - name: Create Distribution
      id: vars
      run: |
        echo "COMMIT_SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - uses: actions/upload-artifact@v4
      with:
        name: hypseus-singe-windows64-romlogger-${{ env.COMMIT_SHORT_SHA }}
        path: dist/
